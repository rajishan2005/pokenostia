# Railway: deploy from GitHub, then set JWT_SECRET + volume /data

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use lightweight health route (not "/") so cold seed never fails the check
healthcheckPath = "/api/health"
# First boot: prisma push + next start can take a while
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
